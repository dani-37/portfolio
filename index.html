<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"
      content="Daniel Vegara — data scientist at the OECD. Building data tools for climate, nature, and policy. Python, statistics, sustainability." />
    <link rel="canonical" href="https://daniel.vegarabalsa.com" />
    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Daniel Vegara — Data Science, Sustainability & Software" />

      property="og:description"
      content="Portfolio — statistics, environment, and software. Currently at the OECD." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Daniel Vegara — Data Science, Sustainability & Software" />
    <meta
      name="twitter:description"
      content="Portfolio — statistics, environment, and software. Currently at the OECD." />
    <meta
      name="twitter:image"
      content="https://daniel.vegarabalsa.com/og-image.png" />
    <link
      rel="preload"
      href="/fonts/lora.woff2"
      as="font"
      type="font/woff2"
      crossorigin />
    <link
      rel="preload"
      href="/fonts/space-grotesk.woff2"
      as="font"
      type="font/woff2"
      crossorigin />
  </head>
  <body>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (
          t === "dark" ||
          (t !== "light" && matchMedia("(prefers-color-scheme:dark)").matches)
        )
          document.documentElement.classList.add("dark");
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
